name: Generate Market Content

on:
  schedule:
    # 한국 시간(KST = UTC+9) 기준
    - cron: '0 15 * * *'   # 자정 00:00 KST
    - cron: '0 9 * * *'    # 오후 18:00 KST
  workflow_dispatch:         # GitHub Actions 탭에서 수동 실행 가능

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      # 레포 코드 체크아웃
      - uses: actions/checkout@v4

      # Node.js 설치 (tsx 실행용)
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      # 의존성 설치
      - name: Install dependencies
        run: npm ci
        working-directory: scripts

      # generate.ts 실행 — Claude가 웹 검색으로 이벤트 리서치 후 JSON 생성
      - name: Run generate script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}  # GitHub Secrets에 등록 필요
          CLAUDE_MODEL: claude-haiku-4-5-20251001
        run: npm run generate
        working-directory: scripts

      # 생성된 output/YYYY-MM-DD.json 을 레포에 커밋 & 푸시
      # 변경사항 없으면 커밋 생략
      - name: Commit output JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "chore: auto-generate market content [$(date +'%Y-%m-%d %H:%M KST')]"
          git push

      # 새 이벤트 추가 / D-3 이하 임박 이벤트 → FCM 푸시 알림 발송
      # FIREBASE_SERVICE_ACCOUNT 없으면 조용히 건너뜀
      - name: Send push notifications
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: npm run notify
        working-directory: scripts
