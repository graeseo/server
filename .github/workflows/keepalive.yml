name: Keepalive Ping

on:
  schedule:
    - cron: '*/14 * * * *'  # 14분마다 Render 슬립 방지

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render server
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://server-3ogx.onrender.com/api/market-topic)
          echo "Response status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: server returned $STATUS"
          fi
